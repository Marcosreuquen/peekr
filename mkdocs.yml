site_name: peekr
site_url: https://marcosreuquen.github.io/peekr/
site_description: Zero-dependency HTTP capture proxy — intercept, log and forward requests from any app to any upstream service.
site_author: Marcos Reuquen
repo_url: https://github.com/Marcosreuquen/peekr
repo_name: Marcosreuquen/peekr

docs_dir: site-docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - Guides:
    - Dashboard UI: guides/dashboard.md
    - Rules Engine: guides/rules-engine.md
  - Reference:
    - CLI Commands: reference/cli.md
  - Development:
    - Architecture: development/architecture.md
    - Contributing: development/contributing.md
    - Changelog: development/changelog.md
